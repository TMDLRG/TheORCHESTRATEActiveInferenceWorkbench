# Local production-mode workbench.
#
#   cp .env.example .env
#   # edit .env and set SECRET_KEY_BASE (generate: `mix phx.gen.secret` or
#   # use any 64+ char random string)
#   docker compose up --build
#   open http://localhost:4000
#
# Mnesia state persists in the `mnesia_data` named volume — surviving
# container restarts. To wipe and start fresh:
#   docker compose down -v

services:
  workbench:
    build:
      context: .
      dockerfile: Dockerfile
    image: orcworkbench:local
    container_name: orcworkbench
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      # Required. `${VAR:?msg}` fails fast if unset instead of booting
      # into a half-running app that crashes on the first request.
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?SECRET_KEY_BASE is required. Copy .env.example to .env and fill it in.}
      PHX_HOST: ${PHX_HOST:-localhost}
      PORT: "4000"
      MNESIA_DIR: /data/mnesia
    volumes:
      - mnesia_data:/data
    # Healthcheck hits / which is always served by WorkbenchWeb.
    healthcheck:
      test: ["CMD-SHELL", "/app/bin/orcworkbench rpc 'IO.puts :ok' >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mnesia_data:
    name: orcworkbench_mnesia
