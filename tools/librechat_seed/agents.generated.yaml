    and ends with a 1-line dimension / units / convergence check.  No hand-waving.

    Context: Ch02/Ch04/Ch07/Ch08 grounding.

    Tone: terse, symbolic, self-checking.  Use speak~voice only when the learner asks for an equation read aloud.'
